{% extends "base.html" %}
{% block content %}
<h2>👂 Listening Assessment</h2>

<div class="listening-section">
    <div class="reference-text">
        <h3>Listen and repeat what you hear:</h3>
        <!-- Hide the reference sentence but keep it accessible for JS -->
        <p id="reference-sentence" class="visually-hidden">{{ reference_text }}</p>
        
        <div class="audio-controls">
            <audio id="reference-audio" controls>
                <source id="reference-audio-source" src="" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <button id="fallbackSpeakBtn" class="next-btn" style="display: none;">Play Reference (Browser Voice)</button>
        </div>
    </div>

    <div class="recording-controls">
        <button id="startRecord" class="record-btn">🎙️ Start Recording</button>
        <button id="stopRecord" class="record-btn" disabled>⏹️ Stop Recording</button>
        <div id="recordingStatus" class="recording-status"></div>
    </div>

    <div id="result" class="result" style="display: none;">
        <h3>Evaluation Result:</h3>
        <div class="grade"></div>
        <div class="score"></div>
        <div class="feedback"></div>
        <div class="comparison">
            <p><strong>You said:</strong> <span class="spoken-text"></span></p>
            <p><strong>Expected:</strong> <span class="reference-text"></span></p>
        </div>
    </div>

    <button id="nextQuestion" class="next-btn" style="display: none;">Try Another Audio</button>
</div>

<script>
let audioContext;
let mediaStreamSource;
let processor;
let audioBufferChunks = [];
let stream;

async function loadReferenceAudio() {
    const referenceTextElement = document.getElementById('reference-sentence');
    const referenceAudio = document.getElementById('reference-audio');
    const sourceElement = document.getElementById('reference-audio-source');
    const fallbackSpeakBtn = document.getElementById('fallbackSpeakBtn');

    if (!referenceTextElement || !sourceElement || !referenceAudio) {
        return;
    }

    try {
        const response = await fetch('/generate-speech', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: referenceTextElement.textContent.trim() })
        });

        const result = await response.json();
        if (!response.ok || !result.success || !result.audio_url) {
            throw new Error(result.error || 'Failed to generate reference audio');
        }

        sourceElement.src = result.audio_url;
        referenceAudio.load();
        if (fallbackSpeakBtn) {
            fallbackSpeakBtn.style.display = 'none';
        }
    } catch (error) {
        console.error('Error loading reference audio:', error);
        const fallbackWorked = speakReferenceWithBrowser(referenceTextElement.textContent.trim());
        if (fallbackSpeakBtn) {
            fallbackSpeakBtn.style.display = fallbackWorked ? 'inline-block' : 'none';
        }

        document.getElementById('recordingStatus').textContent = fallbackWorked
            ? 'Server TTS unavailable. Using browser voice for reference audio.'
            : `Audio load error: ${error.message || 'Failed to prepare reference audio'}`;
    }
}

function speakReferenceWithBrowser(text) {
    if (!('speechSynthesis' in window) || !text) {
        return false;
    }

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.95;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
    return true;
}

document.getElementById('startRecord').addEventListener('click', async () => {
    audioBufferChunks = [];
    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        mediaStreamSource = audioContext.createMediaStreamSource(stream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);

        processor.onaudioprocess = (event) => {
            const inputData = event.inputBuffer.getChannelData(0);
            audioBufferChunks.push(new Float32Array(inputData));
        };

        mediaStreamSource.connect(processor);
        processor.connect(audioContext.destination);

        document.getElementById('startRecord').disabled = true;
        document.getElementById('stopRecord').disabled = false;
        document.getElementById('recordingStatus').textContent = '🔴 Recording...';
    } catch (err) {
        console.error('Error accessing microphone:', err);
        document.getElementById('recordingStatus').textContent = 'Error: Could not access microphone';
    }
});

document.getElementById('stopRecord').addEventListener('click', async () => {
    if (stream) {
        try {
            if (processor) {
                processor.disconnect();
            }
            if (mediaStreamSource) {
                mediaStreamSource.disconnect();
            }
            const sampleRate = audioContext ? audioContext.sampleRate : 48000;

            document.getElementById('startRecord').disabled = false;
            document.getElementById('stopRecord').disabled = true;
            document.getElementById('recordingStatus').textContent = 'Processing...';

            // Get reference text from the correct element
            const referenceText = document.getElementById('reference-sentence');
            if (!referenceText) {
                throw new Error('Reference text element not found');
            }

            // Ensure all tracks are stopped
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            if (audioContext) {
                await audioContext.close();
            }

            // Create blob and send data
            const audioBlob = encodeWavFromFloat32(audioBufferChunks, sampleRate, 16000);
            const formData = new FormData();
            formData.append('audio', audioBlob, `listening_${Date.now()}.wav`);
            formData.append('reference', referenceText.textContent);

            // Send to server with error handling
            const response = await fetch('/listening', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
            }

            const result = await response.json();
            if (!result || result.error) {
                throw new Error(result.error || 'Invalid response from server');
            }
            
            showResult(result);
            
        } catch (error) {
            console.error('Error processing recording:', error);
            document.getElementById('recordingStatus').textContent = 
                `Error: ${error.message || 'Failed to process recording'}`;
        }
    }
});

function encodeWavFromFloat32(chunks, originalSampleRate, targetSampleRate) {
    const merged = mergeFloat32Chunks(chunks);
    const pcmData = downsampleBuffer(merged, originalSampleRate, targetSampleRate);
    const wavBuffer = buildWavBuffer(pcmData, targetSampleRate);
    return new Blob([wavBuffer], { type: 'audio/wav' });
}

function mergeFloat32Chunks(chunks) {
    let totalLength = 0;
    for (const chunk of chunks) {
        totalLength += chunk.length;
    }

    const result = new Float32Array(totalLength);
    let offset = 0;
    for (const chunk of chunks) {
        result.set(chunk, offset);
        offset += chunk.length;
    }
    return result;
}

function downsampleBuffer(buffer, inputRate, outputRate) {
    if (outputRate >= inputRate) {
        return buffer;
    }

    const sampleRateRatio = inputRate / outputRate;
    const newLength = Math.round(buffer.length / sampleRateRatio);
    const result = new Float32Array(newLength);

    let offsetResult = 0;
    let offsetBuffer = 0;
    while (offsetResult < result.length) {
        const nextOffsetBuffer = Math.round((offsetResult + 1) * sampleRateRatio);
        let accum = 0;
        let count = 0;

        for (let i = offsetBuffer; i < nextOffsetBuffer && i < buffer.length; i++) {
            accum += buffer[i];
            count++;
        }

        result[offsetResult] = count > 0 ? accum / count : 0;
        offsetResult++;
        offsetBuffer = nextOffsetBuffer;
    }

    return result;
}

function buildWavBuffer(float32Data, sampleRate) {
    const bytesPerSample = 2;
    const blockAlign = bytesPerSample;
    const dataSize = float32Data.length * bytesPerSample;
    const buffer = new ArrayBuffer(44 + dataSize);
    const view = new DataView(buffer);

    writeAsciiString(view, 0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeAsciiString(view, 8, 'WAVE');
    writeAsciiString(view, 12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * blockAlign, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, 16, true);
    writeAsciiString(view, 36, 'data');
    view.setUint32(40, dataSize, true);

    let offset = 44;
    for (let i = 0; i < float32Data.length; i++, offset += 2) {
        const sample = Math.max(-1, Math.min(1, float32Data[i]));
        view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
    }

    return buffer;
}

function writeAsciiString(view, offset, value) {
    for (let i = 0; i < value.length; i++) {
        view.setUint8(offset + i, value.charCodeAt(i));
    }
}

// Clean up resources on page unload
window.addEventListener('beforeunload', () => {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }
});

function showResult(result) {
    if (!result) {
        document.getElementById('recordingStatus').textContent = 'Error: No evaluation results received';
        return;
    }

    const resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';
    
    resultDiv.querySelector('.grade').textContent = `Grade: ${result.grade}`;
    resultDiv.querySelector('.score').textContent = `Score: ${result.score}%`;
    resultDiv.querySelector('.feedback').textContent = result.feedback;
    resultDiv.querySelector('.spoken-text').textContent = result.spoken;
    resultDiv.querySelector('.reference-text').textContent = result.reference;
    
    document.getElementById('recordingStatus').textContent = 'Evaluation Complete';
    document.getElementById('nextQuestion').style.display = 'block';
}

document.getElementById('nextQuestion').addEventListener('click', () => {
    window.location.reload();
});

document.getElementById('fallbackSpeakBtn').addEventListener('click', () => {
    const referenceText = document.getElementById('reference-sentence').textContent.trim();
    speakReferenceWithBrowser(referenceText);
});

loadReferenceAudio();
</script>
{% endblock %}
